<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canteen Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f97316 0%, #ef4444 50%, #ec4899 100%); }
    .glass { background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); }
    .input-field {
      width:100%; padding:12px 16px;
      border:1.5px solid #e5e7eb; border-radius:12px;
      font-size:14px; outline:none; background:#f9fafb;
      transition:all 0.2s; font-family:'Poppins',sans-serif;
      box-sizing: border-box;
    }
    .input-field:focus { border-color:#f97316; background:white; box-shadow:0 0 0 3px rgba(249,115,22,0.1); }
    .btn-primary {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#f97316,#ef4444);
      color:white; border:none; border-radius:12px;
      font-size:15px; font-weight:600; cursor:pointer;
      transition:all 0.2s; font-family:'Poppins',sans-serif;
    }
    .btn-primary:hover { opacity:0.9; transform:translateY(-1px); box-shadow:0 8px 20px rgba(249,115,22,0.3); }
    .btn-staff {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#1d4ed8,#2563eb);
      color:white; border:none; border-radius:12px;
      font-size:15px; font-weight:600; cursor:pointer;
      transition:all 0.2s; font-family:'Poppins',sans-serif;
    }
    .btn-staff:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-manager {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#7c3aed,#9333ea);
      color:white; border:none; border-radius:12px;
      font-size:15px; font-weight:600; cursor:pointer;
      transition:all 0.2s; font-family:'Poppins',sans-serif;
    }
    .btn-manager:hover { opacity:0.9; transform:translateY(-1px); }
    .tab-btn { flex:1; padding:10px; border-radius:10px; font-size:13px; font-weight:600; border:none; cursor:pointer; transition:all 0.2s; font-family:'Poppins',sans-serif; }
    .tab-active { background:white; color:#f97316; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .tab-inactive { background:transparent; color:#9ca3af; }
    .role-tab { flex:1; padding:9px 4px; border-radius:10px; font-size:12px; font-weight:600; border:none; cursor:pointer; transition:all 0.2s; font-family:'Poppins',sans-serif; }
    .role-active-student  { background:white; color:#ea580c; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .role-active-staff    { background:white; color:#1d4ed8; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .role-active-manager  { background:white; color:#7c3aed; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .role-inactive { background:transparent; color:#9ca3af; }
    label { font-size:12px; font-weight:600; color:#6b7280; display:block; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes fadepulse { 0%,100%{opacity:0.12} 50%{opacity:0.22} }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

  <div style="position:fixed;top:40px;left:40px;font-size:56px;opacity:0.15;animation:bounce 2s infinite;">🍽️</div>
  <div style="position:fixed;bottom:40px;right:40px;font-size:56px;opacity:0.15;animation:bounce 2s infinite;animation-delay:0.6s;">☕</div>
  <div style="position:fixed;top:38%;right:55px;font-size:38px;opacity:0.15;animation:fadepulse 3s infinite;">🥗</div>
  <div style="position:fixed;bottom:28%;left:55px;font-size:38px;opacity:0.15;animation:fadepulse 3s infinite;animation-delay:1s;">🍔</div>

  <div class="glass rounded-3xl shadow-2xl w-full p-8" style="max-width:430px;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:26px;">
      <div style="width:70px;height:70px;background:linear-gradient(135deg,#f97316,#ef4444);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 20px rgba(249,115,22,0.3);font-size:34px;">🍴</div>
      <h1 style="font-size:24px;font-weight:800;color:#111827;margin:0;">College Canteen</h1>
      <p style="color:#9ca3af;font-size:13px;margin-top:3px;">Fresh food, fast orders</p>
    </div>

    <!-- Role Tabs -->
    <div style="background:#f3f4f6;border-radius:14px;padding:5px;display:flex;gap:3px;margin-bottom:22px;">
      <button class="role-tab role-active-student" id="role-student"  onclick="switchRole('student')">🎓 Student</button>
      <button class="role-tab role-inactive"        id="role-staff"   onclick="switchRole('staff')">👨‍🍳 Staff</button>
      <button class="role-tab role-inactive"        id="role-manager" onclick="switchRole('manager')">👨‍💼 Manager</button>
    </div>

    <!-- ═══ STUDENT SECTION ═══ -->
    <div id="student-section">
      <div style="background:#f3f4f6;border-radius:12px;padding:4px;display:flex;margin-bottom:20px;">
        <button class="tab-btn tab-active"   id="tab-login"    onclick="showTab('login')">Login</button>
        <button class="tab-btn tab-inactive" id="tab-register" onclick="showTab('register')">Register</button>
      </div>

      <!-- Student Login -->
      <div id="login-form">
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div><label>Email Address</label><input id="login-email" type="email" placeholder="your@email.com" class="input-field"/></div>
          <div><label>Password</label><input id="login-pass" type="password" placeholder="Enter your password" class="input-field"/></div>
          <button class="btn-primary" onclick="doLogin('student')" style="margin-top:4px;">Sign In 🚀</button>
        </div>
        <p style="text-align:center;font-size:13px;color:#9ca3af;margin-top:14px;">
          Don't have an account? <span onclick="showTab('register')" style="color:#f97316;font-weight:600;cursor:pointer;">Register here</span>
        </p>
      </div>

      <!-- Student Register -->
      <div id="register-form" style="display:none;">
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div><label>Full Name *</label><input id="reg-name" type="text" placeholder="Your full name" class="input-field"/></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div><label>Student ID</label><input id="reg-sid" type="text" placeholder="e.g. STU007" class="input-field"/></div>
            <div><label>Phone</label><input id="reg-phone" type="tel" placeholder="9876543210" class="input-field"/></div>
          </div>
          <div><label>Email Address *</label><input id="reg-email" type="email" placeholder="your@email.com" class="input-field"/></div>
          <div><label>Password * (min 6 chars)</label><input id="reg-pass" type="password" placeholder="Create a strong password" class="input-field"/></div>
          <div><label>Confirm Password *</label><input id="reg-pass2" type="password" placeholder="Repeat your password" class="input-field"/></div>
          <button class="btn-primary" onclick="doRegister()" style="margin-top:2px;">Create Account ✨</button>
        </div>
        <p style="text-align:center;font-size:13px;color:#9ca3af;margin-top:14px;">
          Already have an account? <span onclick="showTab('login')" style="color:#f97316;font-weight:600;cursor:pointer;">Login here</span>
        </p>
      </div>
    </div>

    <!-- ═══ STAFF SECTION ═══ -->
    <div id="staff-section" style="display:none;">
      <div style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:16px;padding:18px;margin-bottom:20px;text-align:center;">
        <div style="font-size:38px;margin-bottom:6px;">👨‍🍳</div>
        <p style="font-weight:700;color:#1e40af;font-size:14px;margin:0 0 3px;">Staff Portal</p>
        <p style="font-size:12px;color:#6b7280;margin:0;">Enter your staff credentials to continue</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div><label>Staff Email</label><input id="staff-email" type="email" placeholder="Enter staff email" class="input-field"/></div>
        <div><label>Password</label><input id="staff-pass" type="password" placeholder="Enter staff password" class="input-field"/></div>
        <button class="btn-staff" onclick="doLogin('staff')">Staff Login 👨‍🍳</button>
      </div>
    </div>

    <!-- ═══ MANAGER SECTION ═══ -->
    <div id="manager-section" style="display:none;">
      <div style="background:#faf5ff;border:1.5px solid #e9d5ff;border-radius:16px;padding:18px;margin-bottom:20px;text-align:center;">
        <div style="font-size:38px;margin-bottom:6px;">👨‍💼</div>
        <p style="font-weight:700;color:#7c3aed;font-size:14px;margin:0 0 3px;">Manager Portal</p>
        <p style="font-size:12px;color:#6b7280;margin:0;">Authorized personnel only</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div><label>Manager Email</label><input id="mgr-email" type="email" placeholder="Enter manager email" class="input-field"/></div>
        <div><label>Password</label><input id="mgr-pass" type="password" placeholder="Enter manager password" class="input-field"/></div>
        <button class="btn-manager" onclick="doLogin('manager')">Manager Login 👨‍💼</button>
      </div>
    </div>

    <!-- Message -->
    <div id="msg" style="display:none;margin-top:16px;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:500;text-align:center;"></div>

  </div>

<script>
  const API = 'http://localhost:5000/api';
  let currentRole = 'student';

  function switchRole(role) {
    currentRole = role;
    hideMsg();
    ['student','staff','manager'].forEach(r => {
      document.getElementById(r + '-section').style.display = r === role ? 'block' : 'none';
      const btn = document.getElementById('role-' + r);
      btn.className = 'role-tab ' + (r === role ? 'role-active-' + r : 'role-inactive');
    });
  }

  function showTab(tab) {
    hideMsg();
    document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').className    = 'tab-btn ' + (tab === 'login'    ? 'tab-active' : 'tab-inactive');
    document.getElementById('tab-register').className = 'tab-btn ' + (tab === 'register' ? 'tab-active' : 'tab-inactive');
  }

  function showMsg(text, ok = true) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.style.display = 'block';
    el.style.background = ok ? '#f0fdf4' : '#fef2f2';
    el.style.color      = ok ? '#16a34a' : '#dc2626';
    el.style.border     = ok ? '1px solid #bbf7d0' : '1px solid #fecaca';
  }
  function hideMsg() { document.getElementById('msg').style.display = 'none'; }

  async function doLogin(role) {
    let email, password;
    if (role === 'student') {
      email    = document.getElementById('login-email').value.trim();
      password = document.getElementById('login-pass').value.trim();
    } else if (role === 'staff') {
      email    = document.getElementById('staff-email').value.trim();
      password = document.getElementById('staff-pass').value.trim();
    } else {
      email    = document.getElementById('mgr-email').value.trim();
      password = document.getElementById('mgr-pass').value.trim();
    }
    if (!email || !password) return showMsg('Please enter your email and password.', false);
    try {
      const res  = await fetch(`${API}/login`, {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (data.success) {
        if (data.user.role !== role) return showMsg(`Wrong portal! These credentials are for ${data.user.role}.`, false);
        localStorage.setItem('user', JSON.stringify(data.user));
        showMsg('Login successful! Redirecting...', true);
        setTimeout(() => {
          if (data.user.role === 'manager')       window.location.href = 'manager.html';
          else if (data.user.role === 'staff')    window.location.href = 'staff.html';
          else                                    window.location.href = 'student.html';
        }, 700);
      } else {
        showMsg(data.message || 'Invalid email or password.', false);
      }
    } catch(e) {
      showMsg('❌ Cannot connect. Make sure Flask (app.py) is running in VS Code!', false);
    }
  }

  async function doRegister() {
    const name      = document.getElementById('reg-name').value.trim();
    const email     = document.getElementById('reg-email').value.trim();
    const password  = document.getElementById('reg-pass').value.trim();
    const password2 = document.getElementById('reg-pass2').value.trim();
    const student_id= document.getElementById('reg-sid').value.trim();
    const phone     = document.getElementById('reg-phone').value.trim();

    if (!name || !email || !password) return showMsg('Name, email and password are required.', false);
    if (password !== password2)       return showMsg('Passwords do not match.', false);
    if (password.length < 6)         return showMsg('Password must be at least 6 characters.', false);

    try {
      const res  = await fetch(`${API}/register`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name, email, password, student_id, phone})
      });
      const data = await res.json();
      if (data.success) {
        showMsg('✅ Account created successfully! Please login.', true);
        ['reg-name','reg-email','reg-pass','reg-pass2','reg-sid','reg-phone'].forEach(id => document.getElementById(id).value = '');
        setTimeout(() => showTab('login'), 1500);
      } else {
        showMsg(data.message || 'Registration failed.', false);
      }
    } catch(e) {
      showMsg('❌ Cannot connect. Make sure Flask (app.py) is running in VS Code!', false);
    }
  }

  document.addEventListener('keypress', e => {
    if (e.key !== 'Enter') return;
    if (currentRole === 'student') {
      document.getElementById('register-form').style.display !== 'none' ? doRegister() : doLogin('student');
    } else if (currentRole === 'staff') {
      doLogin('staff');
    } else {
      doLogin('manager');
    }
  });

  // Auto redirect if already logged in
  const u = JSON.parse(localStorage.getItem('user') || 'null');
  if (u) {
    if (u.role === 'manager')     window.location.href = 'manager.html';
    else if (u.role === 'staff')  window.location.href = 'staff.html';
    else                          window.location.href = 'student.html';
  }
</script>
</body>
</html>
